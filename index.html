<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha de Treino - Rummenigge</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 16px 40px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 28px;
    }

    .day-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      margin-bottom: 18px;
      overflow: hidden;
      border: 1px solid #e7ebef;
    }

    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      cursor: pointer;
      background: #ffffff;
      transition: background 0.2s ease;
    }

    .day-header:hover {
      background: #f9fbfc;
    }

    .day-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: bold;
    }

    .badge {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: #eef3f7;
      color: #445;
      font-weight: normal;
    }

    .arrow {
      font-size: 18px;
      transition: transform 0.2s ease;
    }

    .day-card.open .arrow {
      transform: rotate(180deg);
    }

    .day-content {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid #edf1f4;
      background: #fcfdfe;
    }

    .day-card.open .day-content {
      display: block;
    }

    h3 {
      margin: 18px 0 10px;
      font-size: 16px;
    }

    .exercise-list {
      display: grid;
      gap: 12px;
    }

    .exercise-item {
      background: #fff;
      border: 1px solid #e7ebef;
      border-radius: 12px;
      padding: 14px;
    }

    .exercise-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .exercise-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: bold;
    }

    .load-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .load-group input[type="number"] {
      width: 90px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccd5dd;
      font-size: 14px;
    }

    .sets {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .set-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f4f7fa;
      border: 1px solid #dde4ea;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .warmup-list {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .warmup-item {
      background: #fff;
      border: 1px solid #e7ebef;
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      background: #1f2937;
      color: white;
    }

    button.secondary {
      background: #6b7280;
    }

    .footer-note {
      text-align: center;
      color: #666;
      margin-top: 24px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .exercise-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .load-group {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ficha de Treino</h1>
    <p class="subtitle">Rummenigge - Hipertrofia + Longevidade (40+)</p>

    <div class="controls">
      <button id="expandAllBtn">Abrir todos</button>
      <button id="collapseAllBtn" class="secondary">Fechar todos</button>
      <button id="resetBtn" class="secondary">Limpar marcações</button>
    </div>

    <div id="app"></div>

    <p class="footer-note">
      As marcações e cargas ficam salvas automaticamente no navegador.
    </p>
  </div>

  <script>
    const workoutData = [
      {
        day: "Segunda",
        type: "Natação",
        warmup: [
          { name: "Círculos de braço", reps: "10" },
          { name: "Rotação de quadril", reps: "10" },
          { name: "Movimento leve no lugar", reps: "1-2 min" }
        ],
        exercises: [
          { name: "Natação leve/moderada", sets: 1, load: "" }
        ]
      },
      {
        day: "Terça",
        type: "Peito + Costas",
        warmup: [
          { name: "Círculos de braço (frente)", reps: "10" },
          { name: "Círculos de braço (trás)", reps: "10" },
          { name: "Band pull-apart", reps: "2 x 15" },
          { name: "Supino leve", reps: "1 x 12" },
          { name: "Supino moderado", reps: "1 x 8" }
        ],
        exercises: [
          { name: "Supino com halteres", sets: 4, load: 0 },
          { name: "Puxada frontal", sets: 4, load: 0 },
          { name: "Supino inclinado com halteres", sets: 3, load: 0 },
          { name: "Remada baixa máquina ou halter", sets: 3, load: 0 },
          { name: "Crucifixo máquina ou cabo", sets: 3, load: 0 },
          { name: "Face pull", sets: 3, load: 0 }
        ]
      },
      {
        day: "Quarta",
        type: "Natação",
        warmup: [
          { name: "Círculos de braço", reps: "10" },
          { name: "Rotação de quadril", reps: "10" },
          { name: "Movimento leve no lugar", reps: "1-2 min" }
        ],
        exercises: [
          { name: "Natação leve", sets: 1, load: "" }
        ]
      },
      {
        day: "Quinta",
        type: "Pernas",
        warmup: [
          { name: "Rotação de quadril", reps: "10 cada lado" },
          { name: "Balanço de perna (frente/trás)", reps: "10 cada" },
          { name: "Agachamento sem peso", reps: "2 x 15" },
          { name: "Leg press leve", reps: "1 x 12" },
          { name: "Leg press moderado", reps: "1 x 8" }
        ],
        exercises: [
          { name: "Leg press", sets: 4, load: 0 },
          { name: "Agachamento leve/moderado", sets: 3, load: 0 },
          { name: "Stiff com halteres", sets: 3, load: 0 },
          { name: "Cadeira extensora", sets: 3, load: 0 },
          { name: "Cadeira flexora", sets: 3, load: 0 },
          { name: "Panturrilha", sets: 4, load: 0 }
        ]
      },
      {
        day: "Sexta",
        type: "Ombros + Braços",
        warmup: [
          { name: "Círculos de braço (frente)", reps: "10" },
          { name: "Círculos de braço (trás)", reps: "10" },
          { name: "Elevação lateral leve", reps: "2 x 15" },
          { name: "Rosca leve", reps: "1 x 12" },
          { name: "Desenvolvimento leve", reps: "1 x 12" }
        ],
        exercises: [
          { name: "Desenvolvimento com halteres", sets: 4, load: 0 },
          { name: "Elevação lateral", sets: 3, load: 0 },
          { name: "Rosca direta", sets: 3, load: 0 },
          { name: "Tríceps corda", sets: 3, load: 0 },
          { name: "Rosca alternada", sets: 3, load: 0 },
          { name: "Tríceps testa leve ou banco", sets: 3, load: 0 },
          { name: "Prancha", sets: 3, load: 0 }
        ]
      },
      {
        day: "Sábado",
        type: "Superior leve + mobilidade",
        warmup: [
          { name: "Círculos de braço", reps: "10" },
          { name: "Rotação de quadril", reps: "10" },
          { name: "Alongamento dinâmico leve", reps: "2 min" },
          { name: "Supino leve", reps: "1 x 12" },
          { name: "Remada leve", reps: "1 x 12" }
        ],
        exercises: [
          { name: "Supino leve", sets: 3, load: 0 },
          { name: "Remada leve", sets: 3, load: 0 },
          { name: "Elevação lateral leve", sets: 3, load: 0 },
          { name: "Bíceps leve", sets: 2, load: 0 },
          { name: "Tríceps leve", sets: 2, load: 0 }
        ]
      }
    ];

    const STORAGE_KEY = "ficha_treino_rummenigge_v1";

    function getSavedState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : {};
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function buildId(dayIndex, exerciseIndex, setIndex = null, field = "check") {
      return setIndex === null
        ? `day-${dayIndex}-exercise-${exerciseIndex}-${field}`
        : `day-${dayIndex}-exercise-${exerciseIndex}-set-${setIndex}-${field}`;
    }

    function renderApp() {
      const app = document.getElementById("app");
      const state = getSavedState();

      app.innerHTML = workoutData.map((dayData, dayIndex) => {
        const warmupHtml = dayData.warmup.map(item => `
          <div class="warmup-item">
            <span>${item.name}</span>
            <strong>${item.reps}</strong>
          </div>
        `).join("");

        const exercisesHtml = dayData.exercises.map((exercise, exerciseIndex) => {
          const loadId = buildId(dayIndex, exerciseIndex, null, "load");
          const savedLoad = state[loadId] ?? exercise.load ?? "";

          const setsHtml = Array.from({ length: exercise.sets }, (_, setIndex) => {
            const checkId = buildId(dayIndex, exerciseIndex, setIndex + 1);
            const checked = state[checkId] ? "checked" : "";
            return `
              <label class="set-label">
                <input type="checkbox" data-id="${checkId}" ${checked} />
                Série ${setIndex + 1}
              </label>
            `;
          }).join("");

          return `
            <div class="exercise-item">
              <div class="exercise-top">
                <div class="exercise-name">
                  <span>${exercise.name}</span>
                </div>

                <div class="load-group">
                  <label for="${loadId}"><strong>Carga (kg):</strong></label>
                  <input
                    type="number"
                    id="${loadId}"
                    data-id="${loadId}"
                    min="0"
                    step="0.5"
                    value="${savedLoad}"
                    placeholder="Ex: 20"
                  />
                </div>
              </div>

              <div class="sets">
                ${setsHtml}
              </div>
            </div>
          `;
        }).join("");

        return `
          <div class="day-card">
            <div class="day-header">
              <div class="day-title">
                <span>${dayData.day}</span>
                <span class="badge">${dayData.type}</span>
              </div>
              <span class="arrow">▼</span>
            </div>

            <div class="day-content">
              <h3>Aquecimento</h3>
              <div class="warmup-list">
                ${warmupHtml}
              </div>

              <h3>Treino</h3>
              <div class="exercise-list">
                ${exercisesHtml}
              </div>
            </div>
          </div>
        `;
      }).join("");

      addEventListeners();
    }

    function addEventListeners() {
      const state = getSavedState();

      document.querySelectorAll(".day-header").forEach(header => {
        header.addEventListener("click", () => {
          header.parentElement.classList.toggle("open");
        });
      });

      document.querySelectorAll('input[type="checkbox"]').forEach(input => {
        input.addEventListener("change", (e) => {
          state[e.target.dataset.id] = e.target.checked;
          saveState(state);
        });
      });

      document.querySelectorAll('input[type="number"]').forEach(input => {
        input.addEventListener("input", (e) => {
          state[e.target.dataset.id] = e.target.value;
          saveState(state);
        });
      });

      document.getElementById("expandAllBtn").addEventListener("click", () => {
        document.querySelectorAll(".day-card").forEach(card => {
          card.classList.add("open");
        });
      });

      document.getElementById("collapseAllBtn").addEventListener("click", () => {
        document.querySelectorAll(".day-card").forEach(card => {
          card.classList.remove("open");
        });
      });

      document.getElementById("resetBtn").addEventListener("click", () => {
        const confirmReset = confirm("Deseja limpar todas as marcações e cargas?");
        if (!confirmReset) return;
        localStorage.removeItem(STORAGE_KEY);
        renderApp();
      });
    }

    renderApp();
  </script>
</body>
</html>
