<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ficha de Treino</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

<div class="container">

  <h1>Ficha de Treino</h1>

  <div class="toolbar">
    <button id="themeToggleBtn">Tema</button>
    <button id="expandAllBtn">Abrir</button>
    <button id="collapseAllBtn">Fechar</button>
    <button id="exportBtn">PDF</button>
  </div>

  <div id="stats"></div>

  <div class="layout">

    <aside class="sidebar">
      <h3>Resumo semanal</h3>

      <input type="week" id="weekPicker"/>

      <input type="number" id="bodyWeightInput" placeholder="Peso"/>
      <input type="number" id="waistInput" placeholder="Cintura"/>
      <input type="number" id="energyInput" placeholder="Energia"/>
      <input type="number" id="sleepInput" placeholder="Sono"/>

      <textarea id="weeklyNotesInput" placeholder="Notas"></textarea>

      <h3>Protocolo</h3>
      <div id="rehabProtocolBox"></div>
    </aside>

    <main>
      <div id="app"></div>
    </main>

  </div>

</div>

<script src="js/constants.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/state.js"></script>
<script src="js/stats.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
