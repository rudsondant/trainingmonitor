<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ficha de Treino V2</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div>
        <h1>Ficha de Treino V2</h1>
        <p class="subtitle">Rummenigge · Hipertrofia + Longevidade 40+</p>
      </div>
      <div class="app-header-actions">
        <button id="themeToggleBtn" class="btn btn-secondary">Alternar tema</button>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="Ações principais">
        <button id="expandAllBtn" class="btn">Abrir todos</button>
        <button id="collapseAllBtn" class="btn btn-secondary">Fechar todos</button>
        <button id="clearAllBtn" class="btn btn-danger">Limpar marcações</button>
        <button id="exportBtn" class="btn btn-secondary">Imprimir / PDF</button>
      </section>

      <section id="stats" class="stats" aria-label="Resumo do treino"></section>
      <section id="app" class="app" aria-label="Lista de treinos"></section>
    </main>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
